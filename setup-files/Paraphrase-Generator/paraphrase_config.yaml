# =====================================================================
# Configuration of the STANDALONE paraphrase-bank generator.
# This is deliberately separate from configs/ - the bank is a one-time,
# static asset; the pipeline only READS the finished banks and never
# consults these knobs.
#
# Built ONLY from each dataset's TRAIN split (train.parquet). validation/test
# are never paraphrased - the research signal (DkNN, distances, credibility)
# is computed on train-derived hypotheses and their paraphrases; val/test are
# used only for a separate baseline-accuracy number. See the README.
# =====================================================================
paraphrases:
  # NOTE: the per-hypothesis target and the dataset registry are GLOBALS at
  # the top of generate_paraphrases.py (PARAPHRASES_PER_HYPOTHESIS, DATASETS)
  # - edit them THERE. This file keeps generation/verification knobs only.

  pool_size: null             # null = NO sampling: paraphrase EVERY hypothesis
                              # in the whole train split (the FULL research set).
                              # Set an integer only for a quick smoke test.
                              #
                              # DOWNSTREAM NOTE: with the full pool, Step-1's
                              # DkNN bank currently forces every paraphrased
                              # hypothesis into the bank, which overruns the
                              # sampling.max_bank_examples cap (20k) and makes
                              # Step-3 heavy. The OUTPUT metrics (RFR/SFR/PC/PA)
                              # use the full set regardless; only the DkNN
                              # credibility/layer-distance analysis is bounded by
                              # the bank. This is fixed separately in Step-1/3.

  candidates_per_hypothesis: 12   # raw candidates generated per round BEFORE the gates.
                              # ONE sampling call returns all 12 at once; more
                              # candidates per round => the target is reached in
                              # FEWER (sequential) rounds.

  max_generation_rounds: 6    # round 1 + retry rounds, ALL nucleus sampling
                              # (fresh seed + a mild temperature ramp each round).
                              # With early-stop below, the loop usually ends well
                              # before this cap.

  early_stop_patience: 2      # PERFORMANCE GUARD: if this many CONSECUTIVE retry
                              # rounds add zero new verified paraphrases (the
                              # generator is stuck on the hard remainder), stop
                              # early instead of grinding to max_generation_rounds.
                              # Prevents "hours that end in failure".

  length_ratio:               # paraphrase word-count / hypothesis word-count must stay
    min: 0.6                  # inside these bounds - length & complexity remain at the
    max: 1.5                  # hypothesis's own level, per dataset

  # Generator: the leading open paraphraser on the HF Hub (T5-base fine-tuned
  # on 6.3M ChatGPT paraphrase pairs). Decoding = nucleus / top-p sampling,
  # run in bf16 (T5 is bf16-native; fp16 makes it emit NaNs). Diverse beam
  # search was removed - it caused the CUDA-OOM thrash and most of the runtime.
  generator_model: humarin/chatgpt_paraphraser_on_T5_base
  generator_prompt_prefix: "paraphrase: "
  generation_batch_size: 208      # DEFAULT hypotheses per generation batch (x5
                                  # candidates = 1040 sequences in flight). This
                                  # is the base value; each dataset OVERRIDES it in
                                  # the per_dataset section below, because the OOM
                                  # comes from sentence-length VARIANCE - a batch of
                                  # unusually long sentences needs more than the
                                  # average, so the average must sit well below the
                                  # 23.5GB ceiling. Derived from a real crash: batch
                                  # 288 ran at ~21.8GB average (no spike room) and
                                  # died on heavy batches; 208 -> ~15.7GB average,
                                  # ~7.8GB headroom for the longest batch.

  verifier_batch_size: 768        # (premise/hypothesis, candidate) pairs the verifier
                                  # scores per forward pass. This is a SEPARATE phase
                                  # from the generation spike (though the generator
                                  # weights stay resident), so it has the whole card
                                  # minus ~1.2GB of weights. 768 peaks ~12GB with a
                                  # wide margin - uses the GPU well without risk.

  # Verifier: the strongest public NLI model on the Hub (DeBERTa-v3-large,
  # 885K NLI pairs: MNLI+FEVER+ANLI+LingNLI+WANLI; 91.2% MNLI-m, SOTA ANLI).
  # Run in bf16 (safe for DeBERTa-v3; fp16 can overflow its attention).
  # DOUBLE gate: (a) hypothesis <-> candidate entail each other;
  #              (b) (premise, candidate) label == the gold label.
  verifier_model: MoritzLaurer/DeBERTa-v3-large-mnli-fever-anli-ling-wanli
# =====================================================================
# PER-DATASET OVERRIDES
# The block above is the shared DEFAULT. Each dataset below overrides only
# the knobs that differ - anything omitted inherits the default. This exists
# because the datasets differ in sentence length and difficulty
# (SNLI < MNLI < ANLI), and the OOM is driven by length VARIANCE: a batch of
# unusually long sentences needs more memory than the batch average, so the
# harder/longer a dataset is, the more headroom (smaller batch) it needs.
# Evidence from real rtx_3090 runs at batch 288 (~21.8GB avg): SNLI logged 2
# allocator warnings, MNLI 10-62 - MNLI is markedly more memory-variable, and
# ANLI (adversarial, longest) is expected to be worse still.
# =====================================================================
per_dataset:
  SNLI:                         # shortest, most uniform (image-caption hypotheses)
    generation_batch_size: 208  # avg ~15.7GB, ~7.8GB headroom for the longest batch
  MNLI:                         # longer, multi-genre, high length variance
    generation_batch_size: 192  # avg ~14.5GB, ~9.0GB headroom (MNLI showed the most warnings)
  ANLI:                         # adversarial, longest/hardest -> the most margin
    generation_batch_size: 160  # avg ~12.1GB, ~11.4GB headroom for its long premises