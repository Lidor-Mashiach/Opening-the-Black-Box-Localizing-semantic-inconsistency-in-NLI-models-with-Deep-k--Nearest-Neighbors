# DeBERTa-large (24 layers, dim 1024).
# The anchor paper uses DeBERTa-large (v1). If you prefer v3, change hf_backbone to
# microsoft/deberta-v3-large - nothing else in the pipeline changes.
model_key: DeBERTa-large
hf_backbone: microsoft/deberta-large
pooling: cls
training:
  batch_size: 16
  learning_rate: 1.0e-5
  amp: fp32                   # DeBERTa v1's attention masking does
                              # masked_fill(mask, finfo(dtype).min). Under
                              # autocast the scores are the low-precision dtype
                              # but query_layer.dtype reports fp32, so filling
                              # with finfo(fp32).min (-3.4e38) overflows in BOTH
                              # fp16 (c10::Half) AND bf16 (c10::BFloat16) - a
                              # known transformers-5.x DeBERTa-v1 bug. fp32 (no
                              # autocast) is the only stable choice; TF32 matmul
                              # (enabled in the trainers) keeps it fast on Ampere.

# Optional published checkpoint: Microsoft's official DeBERTa-large fine-tuned
# on MNLI (~91.3/91.1 m/mm acc) - the best published fit for MNLI.
# No official single-dataset SNLI/ANLI checkpoints - train those locally.
nli_checkpoints:
  MNLI: microsoft/deberta-large-mnli